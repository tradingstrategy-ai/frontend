<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-labelledby="title desc">
  <title id="title">GMX.ai strategy logo</title>
  <desc id="desc">Official GMX circular logo with an overlaid robot badge to represent the GMX.ai strategy.</desc>
  <defs>
    <linearGradient id="gmx-gradient" x1="0.536" y1="0.026" x2="0.011" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#03d1cf" stop-opacity="0.988" />
      <stop offset="1" stop-color="#4e09f8" />
    </linearGradient>
    <linearGradient id="badge-gradient" x1="0.18" y1="0.14" x2="0.84" y2="0.88" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#243744" />
      <stop offset="1" stop-color="#111b23" />
    </linearGradient>
    <filter id="badge-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#02060a" flood-opacity="0.35" />
    </filter>
  </defs>

  <circle cx="540" cy="540" r="540" fill="#192631" />
  <path
    d="M1027.896 861.552L601.777 221.384L174.344 861.552H769.842L601.777 617.218L518.408 744.158H429.747L601.777 488.914L850.57 861.552Z"
    fill="url(#gmx-gradient)"
  />

  <g filter="url(#badge-shadow)" transform="translate(770 774) scale(1.18) translate(-786 -790)">
    <circle cx="786" cy="790" r="170" fill="url(#badge-gradient)" stroke="#e8fbff" stroke-opacity="0.24" stroke-width="16" />
    <circle cx="786" cy="790" r="136" fill="#16232d" />

    <g transform="translate(786 766) scale(1.3) translate(-786 -766)">
      <path d="M786 670V710" stroke="#cd4c50" stroke-width="22" stroke-linecap="round" />
      <circle cx="786" cy="652" r="22" fill="#cd4c50" />

      <rect x="702" y="722" width="168" height="144" rx="40" fill="#28b86e" />
      <rect x="728" y="762" width="38" height="38" rx="19" fill="#182430" />
      <rect x="806" y="762" width="38" height="38" rx="19" fill="#182430" />

      <circle cx="748" cy="830" r="12" fill="#cd4c50" />
      <circle cx="784" cy="830" r="12" fill="#cd4c50" />
      <circle cx="820" cy="830" r="12" fill="#cd4c50" />
      <circle cx="856" cy="830" r="12" fill="#cd4c50" />
      <path d="M722 772H692" stroke="#cd4c50" stroke-width="20" stroke-linecap="round" />
      <path d="M880 772H850" stroke="#cd4c50" stroke-width="20" stroke-linecap="round" />
