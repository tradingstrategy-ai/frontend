<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-labelledby="title desc">
  <title id="title">HyperAI strategy logo</title>
  <desc id="desc">A large balance-scale symbol with a smaller Hyperliquid logo inset inside a rounded square for the HyperAI strategy.</desc>
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="36%" r="74%">
      <stop offset="0" stop-color="#223743" />
      <stop offset="1" stop-color="#192631" />
    </radialGradient>
    <radialGradient id="inner-glow" cx="50%" cy="30%" r="70%">
      <stop offset="0" stop-color="#243b49" stop-opacity="0.95" />
      <stop offset="1" stop-color="#132029" stop-opacity="0.92" />
    </radialGradient>
    <linearGradient id="scale-gradient" x1="0.18" y1="0.12" x2="0.84" y2="0.92" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#f1fdff" />
      <stop offset="0.52" stop-color="#d7edf2" />
      <stop offset="1" stop-color="#9dc4cd" />
    </linearGradient>
    <linearGradient id="square-gradient" x1="0.18" y1="0.14" x2="0.84" y2="0.88" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#243744" />
      <stop offset="1" stop-color="#111b23" />
    </linearGradient>
    <filter id="main-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="24" flood-color="#02060a" flood-opacity="0.3" />
    </filter>
    <filter id="square-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#02060a" flood-opacity="0.35" />
    </filter>
  </defs>

  <circle cx="540" cy="540" r="540" fill="url(#bg-glow)" />
  <circle cx="540" cy="540" r="396" fill="url(#inner-glow)" stroke="#e8fbff" stroke-opacity="0.08" stroke-width="10" />
  <circle cx="540" cy="540" r="350" fill="none" stroke="#97FCE4" stroke-opacity="0.1" stroke-width="8" />

  <g filter="url(#main-shadow)">
    <circle cx="540" cy="284" r="28" fill="#F62F2F" />
    <path d="M540 320V724" stroke="#22B554" stroke-width="30" stroke-linecap="round" />
    <path d="M324 410H756" stroke="url(#scale-gradient)" stroke-width="28" stroke-linecap="round" />
    <path d="M416 410H664" stroke="#F62F2F" stroke-width="10" stroke-linecap="round" opacity="0.92" />

    <path d="M388 410L350 592" stroke="url(#scale-gradient)" stroke-width="14" stroke-linecap="round" />
    <path d="M460 410L498 592" stroke="url(#scale-gradient)" stroke-width="14" stroke-linecap="round" />
    <path d="M620 410L582 592" stroke="url(#scale-gradient)" stroke-width="14" stroke-linecap="round" />
    <path d="M692 410L730 592" stroke="url(#scale-gradient)" stroke-width="14" stroke-linecap="round" />

    <path
      d="M326 608C350 668 498 668 522 608"
      fill="none"
      stroke="#22B554"
      stroke-width="24"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <path
      d="M558 608C582 668 730 668 754 608"
      fill="none"
      stroke="#22B554"
      stroke-width="24"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path d="M492 724H588" stroke="#F62F2F" stroke-width="24" stroke-linecap="round" />
    <path d="M430 778H650" stroke="#22B554" stroke-width="30" stroke-linecap="round" />
    <path d="M470 836H610" stroke="url(#scale-gradient)" stroke-width="20" stroke-linecap="round" />
  </g>

  <g filter="url(#square-shadow)">
    <rect x="690" y="690" width="240" height="240" rx="62" fill="url(#square-gradient)" stroke="#e8fbff" stroke-opacity="0.24" stroke-width="16" />
    <rect x="718" y="718" width="184" height="184" rx="42" fill="#16232d" />
    <circle cx="860" cy="760" r="12" fill="#F62F2F" opacity="0.95" />

    <g transform="translate(730 744) scale(0.82)">
      <path
        d="M200 99.5818C200 165.703 159.536 186.919 138.216 168.028C120.667 152.623 115.446 120.072 89.05 116.73C55.5475 112.515 52.6468 157.129 30.6019 157.129C4.93111 157.129 0 119.781 0 100.599C0 80.9807 5.51124 54.2417 27.4111 54.2417C52.9369 54.2417 54.3872 92.4612 86.2944 90.4266C118.057 88.2469 118.637 48.4288 139.232 31.4263C157.215 16.7488 200 32.5888 200 99.5818Z"
        fill="#97FCE4"
      />
    </g>
  </g>
</svg>
