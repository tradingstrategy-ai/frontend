# Markdown description of the strategy
long_description: |
  OpenCZ is a systematic multi-strategy vault for Hyperliquid perpetual futures,
  combining trend-following, mean reversion, liquidation alpha, and macro regime
  signals with fully automated dynamic capital allocation.

  ## How it works

  The strategy blends multiple systematic sub-strategies, each targeting a
  distinct market regime or microstructure pattern. A dynamic allocation engine
  redistributes capital across sub-strategies based on prevailing conditions,
  aiming to maintain balanced exposure across different market environments.

  All execution is fully automated with no manual intervention.

  ## Risk framework

  - 1x leverage
  - Dynamic capital allocation across sub-strategies
  - Systematic position sizing and risk management
